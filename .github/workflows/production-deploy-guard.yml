name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  pre-deploy-check:
    name: Pre-deploy placeholder check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for REPLACE_WITH_ placeholders
        run: |
          if grep -q "REPLACE_WITH_" wrangler.jsonc; then
            echo "::error file=wrangler.jsonc::wrangler.jsonc contains REPLACE_WITH_ placeholder(s). Fill in live Clerk and Stripe keys before deploying to production."
            grep -n "REPLACE_WITH_" wrangler.jsonc
            exit 1
          fi
          echo "No REPLACE_WITH_ placeholders found. Proceeding with production deploy."

  deploy:
    name: Deploy
    needs: pre-deploy-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to production
        run: npm run deploy:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
